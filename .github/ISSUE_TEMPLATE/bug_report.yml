name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it gets fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Register a service with Pulse
        2. Change a setting in the shared config
        3. Observe the subscriber's behaviour
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Pulse version
      placeholder: "e.g. 0.1.0 or git commit hash"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Binary (built from source)
        - Binary (downloaded release)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - Windows
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run with `log.level = debug` (or `PULSE_LOG_LEVEL=debug`) and paste relevant lines. Logs are safe to share — credentials are redacted as `***`.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — browser console errors, network tab, config snippets (omit credentials).
