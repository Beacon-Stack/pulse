version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/postgres"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db/generated"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "camel"
